name: DevSecOps Pipeline

on: [push, pull_request]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # 1. Récupération du code
      # ==========================================
      - name: Checkout source code
        uses: actions/checkout@v4

      # ==========================================
      # 2. Installation Java
      # ==========================================
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # ==========================================
      # 3. Compilation
      # ==========================================
      - name: Maven Build
        run: mvn clean compile

      # ==========================================
      # 4. Packaging
      # ==========================================
      - name: Package Application
        run: mvn package -DskipTests

      # ==========================================
      # 5. Analyse SAST CodeQL
      # ==========================================
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build for CodeQL
        run: mvn clean compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # ==========================================
      # 6. Détection de secrets
      # ==========================================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # 7. Scan des dépendances OWASP
      # ==========================================
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.11-10/x64
        with:
          project: "RAG-Platform"
          path: "."
          format: "HTML"
          args: --nvdApiDelay 4000

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

      # ==========================================
      # 8. Construction Docker
      # ==========================================
      - name: Build Docker Image
        run: docker build -t rag-platform:latest .

      # ==========================================
      # 9. Scan de vulnérabilités Docker
      # ==========================================
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-platform:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
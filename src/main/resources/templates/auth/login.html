<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion - RAG Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2a5298 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
        }

        /* Lang switch */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-bottom: 28px;
        }
        .lang-btn {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            color: #64748b;
            background: #f8fafc;
            text-decoration: none;
            transition: all 0.15s;
        }
        .lang-btn.active {
            background: #1e3a5f;
            color: #fff;
            border-color: #1e3a5f;
        }

        /* Logo */
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px;
            height: 56px;
            background: #1e3a5f;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            font-size: 24px;
            color: #fff;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .logo p {
            font-size: 13px;
            color: #64748b;
        }

        /* Alert */
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 7px;
        }
        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrap .icon-left {
            position: absolute;
            left: 14px;
            color: #9ca3af;
            font-size: 14px;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 14px 12px 42px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: all 0.2s;
        }
        .input-wrap input:focus {
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .icon-right {
            position: absolute;
            right: 14px;
            color: #9ca3af;
            font-size: 14px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .icon-right:hover { color: #374151; }

        /* Options */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }
        .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #1e3a5f;
            cursor: pointer;
        }
        .forgot {
            font-size: 13px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot:hover { text-decoration: underline; }

        /* Button */
        .btn-login {
            width: 100%;
            background: #1e3a5f;
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { background: #2a4f7a; }
        .btn-login:active { transform: scale(0.98); }

        /* Footer */
        .card-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 380px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .modal-header h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #9ca3af;
            line-height: 1;
        }
        .modal-close:hover { color: #374151; }
        .modal p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .btn-send {
            width: 100%;
            background: #1e3a5f;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-send:hover { background: #2a4f7a; }
    </style>
</head>
<body>

<div class="card">

    <!-- Switch langue -->
    <div class="lang-switch">
        <a href="?lang=fr" class="lang-btn active">FR</a>
        <a href="?lang=en" class="lang-btn">EN</a>
    </div>

    <!-- Logo -->
    <div class="logo">
        <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
        <h1>RAG Platform</h1>
        <p>Connectez-vous a votre espace documentaire</p>
    </div>

    <!-- Erreur -->
    <div class="alert-error" th:if="${param.error}">
        <i class="fa-solid fa-circle-exclamation"></i>
        Identifiants incorrects. Veuillez reessayer.
    </div>

    <!-- Formulaire -->
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Adresse email</label>
            <div class="input-wrap">
                <i class="fa-solid fa-envelope icon-left"></i>
                <input type="text" name="username" placeholder="votre@email.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>Mot de passe</label>
            <div class="input-wrap">
                <i class="fa-solid fa-lock icon-left"></i>
                <input type="password" name="password" id="pwd" placeholder="••••••••" required>
                <i class="fa-solid fa-eye icon-right" id="toggleIcon" onclick="togglePwd()"></i>
            </div>
        </div>

        <div class="form-options">
            <label class="remember">
                <input type="checkbox" name="remember-me"> Se souvenir de moi
            </label>
            <a href="#" class="forgot" onclick="openModal(event)">Mot de passe oublie ?</a>
        </div>

        <button type="submit" class="btn-login">
            <i class="fa-solid fa-right-to-bracket"></i> Se connecter
        </button>
    </form>

    <div class="card-footer">
        RAG Platform &copy; 2026 &mdash; Timz
    </div>
</div>

<!-- Modal mot de passe oublié -->
<div class="modal-overlay" id="forgotModal">
    <div class="modal">
        <div class="modal-header">
            <h3>Mot de passe oublie ?</h3>
            <button class="modal-close" onclick="closeModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <p>Entrez votre adresse email et nous vous enverrons un lien de reinitialisation.</p>
        <div class="input-wrap">
            <i class="fa-solid fa-envelope icon-left"></i>
            <input type="email" placeholder="votre@email.com">
        </div>
        <button class="btn-send">
            <i class="fa-solid fa-paper-plane"></i> Envoyer le lien
        </button>
    </div>
</div>

<script>
    function togglePwd() {
        const pwd = document.getElementById('pwd');
        const icon = document.getElementById('toggleIcon');
        if (pwd.type === 'password') {
            pwd.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            pwd.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function openModal(e) {
        e.preventDefault();
        document.getElementById('forgotModal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('forgotModal').classList.remove('open');
    }
</script>
</body>
</html>
